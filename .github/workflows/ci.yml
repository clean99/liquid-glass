name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:docs
      - run: pnpm test:inventory
      - run: pnpm test:unit
      - run: pnpm test:components
      - run: pnpm test:physics
      - run: pnpm test:storybook
      - run: pnpm build
      - run: pnpm test:package

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-test-results
          path: |
            test-results
            storybook-static-behavior
            playwright-report
          if-no-files-found: ignore
