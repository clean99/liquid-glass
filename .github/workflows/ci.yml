name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm format
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:docs
      - run: pnpm test:research
      - run: pnpm test:inventory
      - run: pnpm test:component-coverage
      - run: pnpm test:registry
      - run: pnpm test:shadcn-parity
      - run: pnpm test:release-readiness
      - run: pnpm test:unit
      - run: pnpm test:components
      - run: pnpm test:physics
      - run: pnpm test:storybook
      - run: pnpm test:e2e
      - run: pnpm test:a11y
      - run: pnpm build
      - run: pnpm test:package

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ci-test-results
          path: |
            test-results
            storybook-static-contracts
            storybook-static-e2e
            storybook-static-a11y
            playwright-report
          if-no-files-found: ignore
