name: Feature request
description: Propose a component, token, behavior, or integration.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What real UI problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed API or behavior
      description: Include component props, accessibility requirements, and fallback behavior.
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: References
      description: Link comparable components, specs, or screenshots.
