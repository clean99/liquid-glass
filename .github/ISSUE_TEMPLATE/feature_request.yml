name: Feature request
description: Propose a component, token, behavior, or integration.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Component API
        - Accessibility behavior
        - Registry distribution
        - Documentation
        - Release or CI
        - Browser support
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What real UI problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed API or behavior
      description: Include component props, accessibility requirements, and fallback behavior.
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: References
      description: Link comparable components, specs, or screenshots.
  - type: checkboxes
    id: constraints
    attributes:
      label: Constraints
      options:
        - label: This does not require copying third-party source code.
        - label: This keeps fallback and solid modes functional.
        - label: This does not require claiming unsupported browser or npm release status.
