name: Bug report
description: Report a behavior, accessibility, rendering, or package issue.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is broken?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
      description: Use a git commit if the package is not installed from npm.
      placeholder: 0.1.0 or 91dd6d4
    validations:
      required: true
  - type: input
    id: runtime
    attributes:
      label: Runtime
      description: Node, package manager, React, framework, and operating system.
      placeholder: Node 24.16.0, pnpm 11.5.2, React 19, Next.js 16, macOS
    validations:
      required: true
  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome / Chromium
        - Safari
        - Firefox
        - iOS Safari
        - Other
    validations:
      required: true
  - type: dropdown
    id: liquid_mode
    attributes:
      label: Liquid mode
      options:
        - auto
        - enhanced
        - fallback
        - solid
        - off
        - unknown
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Link a repo, Storybook URL, registry URL, or minimal code sample.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or video
      description: Attach visual evidence for optical or animation bugs.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I verified this is not only an unsupported enhanced-refraction browser path.
        - label: I can reproduce this with fallback or solid mode if readability or interaction is affected.
